<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#07101e"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(15,168,203,0.04)" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#grid)"/>

  <!-- Desktop top menubar -->
  <rect x="0" y="0" width="400" height="22" fill="rgba(0,10,26,0.9)"/>
  <rect x="10" y="8" width="24" height="5" rx="1" fill="rgba(232,228,220,0.5)"/>
  <rect x="42" y="8" width="22" height="5" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="72" y="8" width="26" height="5" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="106" y="8" width="18" height="5" rx="1" fill="rgba(232,228,220,0.2)"/>
  <!-- Right side: clock, wifi, battery -->
  <rect x="316" y="9" width="24" height="4" rx="1" fill="rgba(232,228,220,0.3)"/>
  <rect x="348" y="8" width="12" height="6" rx="2" fill="none" stroke="rgba(232,228,220,0.3)" stroke-width="1"/>
  <rect x="349" y="9" width="8" height="4" rx="1" fill="rgba(15,168,203,0.5)"/>
  <rect x="362" y="9" width="3" height="4" rx="1" fill="rgba(232,228,220,0.25)"/>
  <rect x="373" y="7" width="14" height="8" rx="1" fill="none" stroke="rgba(232,228,220,0.3)" stroke-width="1"/>
  <rect x="374" y="8" width="10" height="6" rx="0.5" fill="rgba(15,168,203,0.4)"/>
  <rect x="387" y="9" width="2" height="4" rx="1" fill="rgba(232,228,220,0.3)"/>

  <!-- Window 1 — main (large, center-left) -->
  <rect x="18" y="32" width="230" height="180" rx="8" fill="#0d1a2e" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Window chrome -->
  <rect x="18" y="32" width="230" height="24" rx="8" fill="rgba(0,26,77,0.5)"/>
  <rect x="18" y="44" width="230" height="12" fill="rgba(0,26,77,0.5)"/>
  <!-- Traffic lights -->
  <circle cx="30" cy="44" r="4" fill="rgba(232,57,30,0.7)"/>
  <circle cx="42" cy="44" r="4" fill="rgba(232,228,220,0.25)"/>
  <circle cx="54" cy="44" r="4" fill="rgba(15,168,203,0.45)"/>
  <!-- Window title -->
  <rect x="100" y="41" width="64" height="5" rx="2" fill="rgba(232,228,220,0.3)"/>
  <!-- Window content -->
  <rect x="26" y="64" width="100" height="5" rx="1" fill="rgba(232,228,220,0.5)"/>
  <rect x="26" y="74" width="70" height="4" rx="1" fill="rgba(15,168,203,0.4)"/>
  <rect x="26" y="86" width="18" height="2" rx="1" fill="#0fa8cb"/>
  <rect x="26" y="95" width="206" height="3" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="26" y="102" width="190" height="3" rx="1" fill="rgba(232,228,220,0.15)"/>
  <rect x="26" y="109" width="200" height="3" rx="1" fill="rgba(232,228,220,0.15)"/>
  <!-- Code / terminal block -->
  <rect x="26" y="122" width="214" height="70" rx="4" fill="rgba(0,0,0,0.3)"/>
  <rect x="34" y="130" width="12" height="3" rx="1" fill="rgba(15,168,203,0.6)"/>
  <rect x="50" y="130" width="60" height="3" rx="1" fill="rgba(232,228,220,0.35)"/>
  <rect x="34" y="139" width="8" height="3" rx="1" fill="rgba(232,57,30,0.6)"/>
  <rect x="46" y="139" width="80" height="3" rx="1" fill="rgba(232,228,220,0.25)"/>
  <rect x="34" y="148" width="16" height="3" rx="1" fill="rgba(15,168,203,0.4)"/>
  <rect x="54" y="148" width="50" height="3" rx="1" fill="rgba(232,228,220,0.3)"/>
  <rect x="34" y="157" width="10" height="3" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="48" y="157" width="40" height="3" rx="1" fill="rgba(232,228,220,0.18)"/>
  <rect x="34" y="166" width="6" height="3" rx="1" fill="rgba(232,228,220,0.4)"/>
  <rect x="34" y="175" width="8" height="3" rx="1" fill="rgba(15,168,203,0.5)"/>
  <!-- Cursor blink -->
  <rect x="44" y="175" width="6" height="3" rx="0.5" fill="rgba(15,168,203,0.8)"/>

  <!-- Window 2 — floating right -->
  <rect x="210" y="52" width="168" height="140" rx="8" fill="#101e30" stroke="rgba(255,255,255,0.12)" stroke-width="1" filter="drop-shadow(0 8px 24px rgba(0,0,0,0.5))"/>
  <rect x="210" y="52" width="168" height="24" rx="8" fill="rgba(0,26,77,0.55)"/>
  <rect x="210" y="64" width="168" height="12" fill="rgba(0,26,77,0.55)"/>
  <circle cx="222" cy="64" r="4" fill="rgba(232,57,30,0.7)"/>
  <circle cx="234" cy="64" r="4" fill="rgba(232,228,220,0.25)"/>
  <circle cx="246" cy="64" r="4" fill="rgba(15,168,203,0.45)"/>
  <rect x="280" y="61" width="50" height="5" rx="2" fill="rgba(232,228,220,0.25)"/>
  <!-- Window 2 content: settings/config panels -->
  <rect x="218" y="84" width="72" height="100" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
  <rect x="222" y="90" width="40" height="4" rx="1" fill="rgba(15,168,203,0.5)"/>
  <rect x="222" y="100" width="52" height="3" rx="1" fill="rgba(232,228,220,0.3)"/>
  <rect x="222" y="108" width="44" height="3" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="222" y="116" width="48" height="3" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="222" y="124" width="36" height="3" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="222" y="132" width="52" height="3" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="222" y="140" width="42" height="3" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="222" y="154" width="54" height="16" rx="3" fill="rgba(15,168,203,0.12)" stroke="rgba(15,168,203,0.3)" stroke-width="1"/>
  <rect x="232" y="159" width="32" height="3" rx="1" fill="rgba(15,168,203,0.55)"/>

  <rect x="294" y="84" width="76" height="100" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
  <rect x="300" y="90" width="30" height="4" rx="1" fill="rgba(232,228,220,0.35)"/>
  <!-- Toggle switches -->
  <rect x="300" y="101" width="30" height="8" rx="4" fill="rgba(15,168,203,0.15)" stroke="rgba(15,168,203,0.3)" stroke-width="0.8"/>
  <circle cx="322" cy="105" r="4" fill="#0fa8cb"/>
  <rect x="300" y="116" width="30" height="8" rx="4" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
  <circle cx="304" cy="120" r="4" fill="rgba(232,228,220,0.4)"/>
  <rect x="300" y="131" width="30" height="8" rx="4" fill="rgba(15,168,203,0.15)" stroke="rgba(15,168,203,0.3)" stroke-width="0.8"/>
  <circle cx="322" cy="135" r="4" fill="#0fa8cb"/>
  <rect x="300" y="154" width="60" height="16" rx="3" fill="rgba(232,57,30,0.1)" stroke="rgba(232,57,30,0.3)" stroke-width="1"/>
  <rect x="312" y="159" width="34" height="3" rx="1" fill="rgba(232,57,30,0.5)"/>

  <!-- Small notification / widget window bottom right -->
  <rect x="286" y="200" width="96" height="66" rx="6" fill="rgba(0,26,77,0.7)" stroke="rgba(15,168,203,0.2)" stroke-width="1"/>
  <rect x="294" y="209" width="40" height="4" rx="1" fill="rgba(232,228,220,0.5)"/>
  <rect x="294" y="217" width="60" height="3" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="294" y="224" width="52" height="3" rx="1" fill="rgba(232,228,220,0.2)"/>
  <rect x="294" y="236" width="36" height="14" rx="3" fill="rgba(15,168,203,0.12)" stroke="rgba(15,168,203,0.25)" stroke-width="1"/>
  <rect x="300" y="240" width="22" height="3" rx="1" fill="rgba(15,168,203,0.5)"/>
  <circle cx="364" cy="209" r="8" fill="rgba(15,168,203,0.15)" stroke="rgba(15,168,203,0.3)" stroke-width="1"/>
  <rect x="361" y="207" width="6" height="1.5" rx="0.5" fill="rgba(15,168,203,0.7)"/>
  <rect x="361" y="210" width="6" height="1.5" rx="0.5" fill="rgba(15,168,203,0.7)"/>
  <rect x="361" y="213" width="6" height="1.5" rx="0.5" fill="rgba(15,168,203,0.7)"/>

  <!-- Dock -->
  <rect x="100" y="272" width="200" height="22" rx="11" fill="rgba(0,26,77,0.6)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="120" cy="283" r="6" fill="rgba(15,168,203,0.3)"/>
  <circle cx="140" cy="283" r="6" fill="rgba(232,228,220,0.15)"/>
  <circle cx="160" cy="283" r="6" fill="rgba(232,57,30,0.25)"/>
  <circle cx="180" cy="283" r="6" fill="rgba(232,228,220,0.15)"/>
  <circle cx="200" cy="283" r="6" fill="rgba(15,168,203,0.2)"/>
  <circle cx="220" cy="283" r="6" fill="rgba(232,228,220,0.15)"/>
  <circle cx="240" cy="283" r="6" fill="rgba(0,26,77,0.5)" stroke="rgba(232,228,220,0.2)" stroke-width="0.8"/>
  <circle cx="260" cy="283" r="6" fill="rgba(15,168,203,0.15)"/>
  <!-- Active dot under dock icon -->
  <circle cx="120" cy="295" r="1.5" fill="#0fa8cb"/>
  <circle cx="160" cy="295" r="1.5" fill="rgba(232,57,30,0.6)"/>
</svg>
