<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R.O.B. Concept Film — v5.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,600;0,700;1,600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:      #f6f2ea;
      --cream-deep: #efe8dc;
      --navy:       #001a4d;
      --cyan:       #0fa8cb;
      --red:        #e8391e;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--cream);
      color: rgba(0,0,0,0.92);
    }

    /* ══ Stage ══ */
    .film-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 84% 24%, rgba(15,168,203,0.08), transparent 24%),
        radial-gradient(circle at 12% 82%, rgba(232,57,30,0.05), transparent 20%),
        linear-gradient(180deg, var(--cream) 0%, var(--cream-deep) 100%);
    }

    /* inner border frame */
    .film-stage::before {
      content: '';
      position: absolute;
      inset: 16px;
      z-index: 1;
      border: 1px solid rgba(0,26,77,0.08);
      pointer-events: none;
    }
    /* top + bottom hairlines inside frame */
    .film-stage::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(rgba(0,26,77,0.045),rgba(0,26,77,0.045)) 16px 16px / calc(100% - 32px) 1px no-repeat,
        linear-gradient(rgba(0,26,77,0.04), rgba(0,26,77,0.04))  16px calc(100% - 16px) / calc(100% - 32px) 1px no-repeat;
      pointer-events: none;
    }

    /* ══ Top & bottom bars ══ */
    .film-topbar,
    .film-bottom-bar {
      position: absolute;
      left: 28px; right: 28px;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(0,26,77,0.42);
    }
    .film-topbar     { top: 24px; }
    .film-bottom-bar { bottom: 22px; }

    .film-top-left,
    .film-top-right  { display: flex; align-items: center; gap: 18px; }
    .film-brandline  { color: rgba(0,26,77,0.58); }
    .film-scene-label { color: rgba(15,168,203,0.92); }

    /* status dot */
    .film-rec-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      margin-right: 4px;
      vertical-align: middle;
      animation: rec-blink 2.2s ease-in-out infinite;
    }
    @keyframes rec-blink { 0%,100%{ opacity:1 } 50%{ opacity:0.25 } }

    /* ══ Large ghosted scene number ══ */
    .film-scene-number {
      position: absolute;
      top: 82px; right: 48px;
      z-index: 2;
      font-size: clamp(140px, 22vw, 320px);
      line-height: 0.9;
      font-weight: 300;
      letter-spacing: -0.06em;
      color: rgba(15,168,203,0.18);
      pointer-events: none;
      transition: transform 0.9s ease, opacity 0.4s ease;
      user-select: none;
    }

    /* ══ Orbital clock elements ══ */
    .film-orbital {
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }
    .film-orbital-right {
      top: -18px; right: -80px;
      width: 620px; height: 620px;
    }
    .film-orbital-left {
      left: -200px; bottom: -220px;
      width: 560px; height: 560px;
      opacity: 0.48;
      animation: float-breath 14s ease-in-out infinite;
      animation-play-state: paused;
    }
    .film-orbital-center {
      right: 110px; bottom: 112px;
      width: 160px; height: 160px;
      opacity: 0.84;
    }

    .film-ring, .film-rotor {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }
    .film-ring { border: 1px solid rgba(15,168,203,0.16); }
    .film-ring-xl  { inset: 0; }
    .film-ring-lg  { inset: 92px; }
    .film-ring-md  { inset: 170px; }
    .film-ring-sm  { inset: 44px; }

    .film-rotor {
      animation: clock-spin 26s linear infinite;
      animation-play-state: paused;
    }
    .rotor-major  { inset: 54px;  animation-duration: 18s; }
    .rotor-minor  { inset: 140px; animation-duration: 12s; }
    .rotor-gentle { inset: 100px; animation-duration: 22s; }

    .film-node {
      position: absolute;
      top: -5px; left: 50%;
      width: 12px; height: 12px;
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 0 12px rgba(255,255,255,0.2);
    }
    .film-node-cyan  { background: rgba(15,168,203,0.95); }
    .film-node-soft  { width:10px; height:10px; background: rgba(15,168,203,0.18); box-shadow: 0 0 0 10px rgba(15,168,203,0.06); }
    .film-node-red   { width:11px; height:11px; background: rgba(232,57,30,0.58);  box-shadow: 0 0 0 10px rgba(232,57,30,0.06); }

    .film-core-dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(15,168,203,0.32);
      transform: translate(-50%,-50%);
    }

    .film-diamond {
      position: absolute;
      width: 176px; height: 176px;
      right: 58px; bottom: 24px;
      transform: rotate(45deg);
      border: 1px solid rgba(0,26,77,0.10);
      border-radius: 0;
    }

    @keyframes clock-spin    { to { transform: rotate(360deg); } }
    @keyframes float-breath  { 0%,100%{ transform:translate3d(0,0,0) } 50%{ transform:translate3d(0,-8px,0) } }
    @keyframes signal-pulse  { 0%,100%{ transform:scale(1); opacity:0.98 } 50%{ transform:scale(1.035); opacity:1 } }
    @keyframes aanbod-card-in    { from { opacity:0; transform:translateY(22px) } to { opacity:1; transform:translateY(0) } }
    @keyframes aanbod-scan       { from { top:0 } to { top:110% } }
    @keyframes aanbod-icon-pulse { 0%,100%{ transform:scale(1); opacity:0.72 } 50%{ transform:scale(1.32); opacity:1 } }

    /* ══ Signal strip (scene 01) ══ */
    .film-signal-strip {
      position: absolute;
      top: 208px; left: 50%;
      z-index: 3;
      display: flex;
      align-items: center;
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease, transform 0.6s ease;
    }
    .film-signal-link {
      width: 72px; height: 1px;
      background: rgba(15,168,203,0.48);
    }
    .film-signal-node {
      position: relative;
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 1px solid rgba(0,26,77,0.18);
      background: rgba(255,255,255,0.08);
    }
    .film-signal-node::before,
    .film-signal-node::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      transform: translate(-50%,-50%);
    }
    .film-signal-node::before { width:34px; height:34px; border:1px solid rgba(0,26,77,0.18); }
    .film-signal-node::after  { width:16px; height:16px; background:rgba(15,168,203,0.92); box-shadow:0 0 0 10px rgba(15,168,203,0.08); }
    .film-signal-node.is-cyan { border-color: rgba(15,168,203,0.86); }
    .film-signal-node.is-cyan::before { border-color: rgba(15,168,203,0.32); }
    .film-signal-node.is-dashed { border-style: dashed; border-color: rgba(0,26,77,0.24); }
    .film-signal-node.is-dashed::before { display: none; }
    .film-signal-node.is-dashed::after  { background: rgba(232,57,30,0.95); box-shadow: none; }

    /* ══ Chrome overlays ══ */
    .film-center-frame,
    .film-side-frame,
    .film-layer-frame,
    .film-log-frame {
      position: absolute;
      z-index: 3;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.45s ease;
    }
    [hidden] { display: none !important; }

    .film-center-frame {
      top: 170px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(15,168,203,0.84);
      white-space: nowrap;
    }
    .film-side-frame {
      top: 118px; left: 54px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(15,168,203,0.92);
      white-space: nowrap;
    }
    .film-side-frame::before {
      content: '';
      width: 30px; height: 1px;
      background: rgba(15,168,203,0.9);
      flex: 0 0 auto;
    }
    .film-layer-frame {
      right: 170px; bottom: 168px;
      padding: 0 14px;
      min-width: 72px; height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(0,26,77,0.38);
      border: 1px solid rgba(15,168,203,0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(4px);
    }
    .film-log-frame {
      left: 36px; bottom: 52px;
      display: grid;
      gap: 2px;
      max-width: 260px;
      font-size: 10px;
      line-height: 1.5;
      letter-spacing: 0.08em;
      color: rgba(0,26,77,0.18);
    }
    .film-log-line { white-space: nowrap; }

    /* ══ Main content layout ══ */
    .film-layout {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr;
      gap: 34px;
      height: 100%;
      padding: 112px 52px 118px;
      align-content: start;
    }
    .film-main {
      max-width: min(920px, 72vw);
      transition: transform 0.45s ease, opacity 0.45s ease;
    }

    /* ── Step label ── */
    .film-step {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 11px;
      color: rgba(15,168,203,0.96);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    /* ── Headline ── */
    .film-title {
      font-size: clamp(52px, 7.2vw, 108px);
      line-height: 0.93;
      font-weight: 300;
      letter-spacing: -0.04em;
      margin: 0 0 16px;
      color: rgba(0,0,0,0.94);
      max-width: 930px;
    }
    .film-title em { font-style: italic; font-weight: 600; }

    /* ── Subtitle / promise / process ── */
    .film-subtitle,
    .film-promise {
      margin: 0;
      max-width: 880px;
      font-size: clamp(18px, 2vw, 32px);
      line-height: 1.35;
      font-weight: 300;
      color: rgba(0,26,77,0.5);
    }
    .film-subtitle { font-style: italic; }
    .film-promise {
      margin-top: 22px;
      font-size: clamp(14px, 1.2vw, 20px);
      line-height: 1.75;
      color: rgba(0,26,77,0.62);
    }
    .film-process {
      margin-top: 28px;
      max-width: 980px;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: clamp(13px, 1.15vw, 20px);
      line-height: 1.8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(0,26,77,0.7);
    }
    .film-process em     { color: var(--cyan);  font-style: normal; font-weight: 500; }
    .film-process strong { color: var(--red);   font-weight: 500; }

    /* ══ Points list / grid ══ */
    .film-points {
      width: min(920px, 70vw);
      display: grid;
      gap: 0;
      transition: transform 0.45s ease, opacity 0.45s ease;
    }
    .film-points[data-layout="minimal"],
    .film-points[data-layout="close"]  { display: none; }

    /* list layout */
    .film-points[data-layout="list"] { border-top: 1px solid rgba(0,26,77,0.1); }
    .film-points[data-layout="list"] .film-point {
      display: grid;
      grid-template-columns: 56px minmax(0,280px) 1fr;
      gap: 14px;
      align-items: center;
      min-height: 92px;
      border-bottom: 1px solid rgba(0,26,77,0.08);
    }

    /* grid layout */
    .film-points[data-layout="grid"] {
      grid-template-columns: repeat(2, minmax(0,1fr));
      border: 1px solid rgba(0,26,77,0.18);
      position: relative;
      overflow: hidden;
    }
    .film-points[data-layout="grid"] .film-point {
      min-height: 152px;
      padding: 26px 30px;
      border-right:  1px solid rgba(0,26,77,0.12);
      border-bottom: 1px solid rgba(0,26,77,0.12);
      background: rgba(255,255,255,0.62);
      position: relative;
      overflow: hidden;
    }
    .film-points[data-layout="grid"] .film-point:nth-child(2n)       { border-right: none; }
    .film-points[data-layout="grid"] .film-point:nth-last-child(-n+2) { border-bottom: none; }
    /* per-card accent stripe — cyan / red alternating */
    .film-points[data-layout="grid"] .film-point:nth-child(1),
    .film-points[data-layout="grid"] .film-point:nth-child(4) { border-top: 3px solid rgba(15,168,203,0.9); }
    .film-points[data-layout="grid"] .film-point:nth-child(2),
    .film-points[data-layout="grid"] .film-point:nth-child(3) { border-top: 3px solid rgba(232,57,30,0.82); }
    /* grid-specific label + icon overrides */
    .film-points[data-layout="grid"] .film-point-label {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.01em;
    }
    .film-points[data-layout="grid"] .film-point-icon { opacity: 0.72; margin-bottom: 10px; }
    /* scan line injected by JS */
    .aanbod-scanline {
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(15,168,203,0.8) 20%, rgba(15,168,203,1) 50%, rgba(15,168,203,0.8) 80%, transparent 100%);
      box-shadow: 0 0 16px rgba(15,168,203,0.55), 0 0 6px rgba(15,168,203,0.9);
      pointer-events: none;
      z-index: 10;
      animation: aanbod-scan 1.05s linear forwards;
    }
    /* card reveal animation */
    .film-point.aanbod-visible {
      animation: aanbod-card-in 0.48s cubic-bezier(0.22,0.7,0.38,1) forwards;
    }
    .film-point.aanbod-visible .film-point-icon {
      animation: aanbod-icon-pulse 1.4s ease-in-out 0.55s forwards;
    }

    .film-point-index {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(0,26,77,0.26);
    }
    .film-point-icon {
      margin-bottom: 12px;
      opacity: 0.55;
    }
    .film-point-label {
      font-size: 18px;
      line-height: 1.2;
      font-weight: 600;
      color: rgba(0,0,0,0.9);
    }
    .film-point-text {
      font-size: 15px;
      line-height: 1.65;
      color: rgba(0,26,77,0.46);
      font-weight: 300;
    }

    /* ══ Footer ══ */
    .film-footer {
      position: absolute;
      left: 52px; right: 52px; bottom: 58px;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .film-progress {
      display: grid;
      grid-template-columns: repeat(6, minmax(0,1fr));
      gap: 8px;
      flex: 1;
      max-width: 560px;
    }
    .film-progress-item {
      height: 6px;
      border: none;
      border-radius: 999px;
      background: rgba(0,26,77,0.08);
      cursor: pointer;
      padding: 0;
      overflow: hidden;
      position: relative;
    }
    .film-progress-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(15,168,203,0.92), rgba(15,168,203,0.3));
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0.85;
    }
    .film-progress-item.is-active::after,
    .film-progress-item.is-past::after  { transform: scaleX(1); }
    .film-progress-item.is-active       { box-shadow: 0 0 0 1px rgba(15,168,203,0.24); }

    .film-controls { display: flex; gap: 10px; }
    .film-btn {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(0,26,77,0.12);
      background: rgba(255,255,255,0.3);
      color: rgba(0,26,77,0.58);
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }
    .film-btn:hover {
      border-color: rgba(15,168,203,0.32);
      background: rgba(15,168,203,0.12);
      color: rgba(0,26,77,0.88);
    }

    /* ══ Layout variants (data-layout on .film-stage) ══ */

    /* — minimal (scene 01) — */
    .film-stage[data-layout="minimal"] .film-layout {
      align-content: end;
      padding-bottom: 168px;
    }
    .film-stage[data-layout="minimal"] .film-main {
      max-width: min(980px,78vw);
      text-align: center;
      justify-self: center;
    }
    .film-stage[data-layout="minimal"] .film-signal-strip {
      opacity: 1;
      transform: translateX(-50%);
    }
    .film-stage[data-layout="minimal"] .film-step {
      margin-bottom: 220px;
      text-align: center;
      color: rgba(15,168,203,0.84);
      visibility: hidden; /* spacer only — signal strip fills this gap visually */
    }
    .film-stage[data-layout="minimal"] .film-title      { max-width: 1180px; margin-inline: auto; }
    .film-stage[data-layout="minimal"] .film-promise {
      margin-inline: auto;
      max-width: 720px;
      font-family: 'IBM Plex Mono','Courier New',monospace;
      font-size: clamp(11px,1vw,15px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(0,26,77,0.42);
    }
    .film-stage[data-layout="minimal"] .film-side-frame,
    .film-stage[data-layout="minimal"] .film-layer-frame { display: none; }

    /* — list (scenes 02–04) — */
    .film-stage[data-layout="list"] .film-step,
    .film-stage[data-layout="grid"] .film-step {
      display: inline-flex;
      align-items: center;
      gap: 16px;
    }
    .film-stage[data-layout="list"] .film-step::before,
    .film-stage[data-layout="grid"] .film-step::before {
      content: '';
      width: 28px; height: 1px;
      background: rgba(15,168,203,0.88);
      flex: 0 0 auto;
    }
    .film-stage[data-layout="list"] .film-main,
    .film-stage[data-layout="grid"] .film-main { max-width: min(980px,74vw); }
    .film-stage[data-layout="list"] .film-title,
    .film-stage[data-layout="grid"] .film-title { max-width: 900px; }
    .film-stage[data-layout="list"] .film-subtitle {
      display: inline-flex;
      align-items: center;
      gap: 16px;
    }
    .film-stage[data-layout="list"] .film-subtitle::after {
      content: '';
      width: 56px; height: 2px;
      background: rgba(15,168,203,0.88);
      transform: translateY(2px);
    }
    .film-stage[data-layout="list"]  .film-center-frame,
    .film-stage[data-layout="grid"]  .film-center-frame { display: none; }

    /* side-frame hidden in list/grid — film-step::before already provides the line+label */
    .film-stage[data-layout="list"] .film-side-frame,
    .film-stage[data-layout="grid"] .film-side-frame { display: none; }

    /* — close (scene 06) — */
    .film-stage[data-layout="close"] .film-layout {
      align-content: center;
      justify-items: center;
      text-align: center;
      padding-top: 140px;
      padding-bottom: 176px;
    }
    .film-stage[data-layout="close"] .film-main    { max-width: 980px; }
    .film-stage[data-layout="close"] .film-title   { max-width: none; font-size: clamp(50px,6vw,92px); }
    .film-stage[data-layout="close"] .film-subtitle {
      font-size: clamp(26px,3vw,50px);
      font-style: normal;
      color: rgba(0,26,77,0.5);
    }
    .film-stage[data-layout="close"] .film-promise {
      margin-top: 36px;
      font-size: clamp(13px,1.1vw,18px);
      color: rgba(0,26,77,0.5);
      font-style: italic;
    }
    .film-stage[data-layout="close"] .film-process {
      margin-top: 28px;
      font-size: clamp(13px,1.1vw,18px);
      color: rgba(0,26,77,0.72);
      letter-spacing: 0.14em;
    }
    .film-stage[data-layout="close"] .film-center-frame,
    .film-stage[data-layout="close"] .film-side-frame  { display: none; }

    /* ══ Playing state: start orbital animations ══ */
    .film-stage.is-playing .film-rotor,
    .film-stage.is-playing .film-orbital-left {
      animation-play-state: running;
    }
    .film-stage.is-playing .film-signal-node {
      animation: signal-pulse 5.2s ease-in-out infinite;
    }
    .film-stage.is-playing .film-signal-node.is-cyan   { animation-delay: 0.9s; }
    .film-stage.is-playing .film-signal-node.is-dashed { animation-delay: 1.8s; }

    /* ══ Transition: content slides down + fades ══ */
    .film-stage.is-transitioning .film-main,
    .film-stage.is-transitioning .film-points,
    .film-stage.is-transitioning .film-scene-number,
    .film-stage.is-transitioning .film-center-frame,
    .film-stage.is-transitioning .film-side-frame,
    .film-stage.is-transitioning .film-layer-frame,
    .film-stage.is-transitioning .film-log-frame {
      opacity: 0;
      transform: translateY(14px);
    }

    /* ══ Responsive ══ */
    @media (max-width: 700px) {
      .film-topbar, .film-bottom-bar { left:18px; right:18px; font-size:8.5px; letter-spacing:0.12em; }
      .film-topbar { top:18px; } .film-bottom-bar { bottom:14px; }
      .film-top-left, .film-top-right { gap:10px; }
      .film-scene-number { top:92px; right:18px; font-size:138px; }
      .film-orbital-right { width:360px; height:360px; top:8px; right:-112px; }
      .film-orbital-left  { width:300px; height:300px; left:-120px; bottom:-118px; }
      .film-orbital-center { width:120px; height:120px; right:40px; bottom:118px; }
      .film-layout { gap:20px; padding:98px 22px 134px; }
      .film-main { max-width:100%; }
      .film-title { font-size:48px; max-width:100%; }
      .film-subtitle, .film-promise { max-width:100%; font-size:15px; }
      .film-process { max-width:100%; font-size:11px; letter-spacing:0.08em; }
      .film-points { width:100%; }
      .film-points[data-layout="list"]  .film-point { grid-template-columns:44px minmax(0,1fr); }
      .film-points[data-layout="grid"]  { grid-template-columns:1fr; }
      .film-points[data-layout="grid"]  .film-point { border-right:none; }
      .film-layer-frame, .film-log-frame { display:none; }
      .film-footer { left:22px; right:22px; bottom:46px; flex-direction:column; align-items:stretch; gap:14px; }
      .film-progress { grid-template-columns: repeat(3,minmax(0,1fr)); }
      .film-controls { justify-content:space-between; }
      .film-btn { flex:1; display:flex; align-items:center; justify-content:center; }
      .film-stage[data-layout="minimal"] .film-step { margin-bottom:176px; }
      .film-stage[data-layout="close"]   .film-title { font-size:42px; }
      .film-stage[data-layout="close"]   .film-subtitle { font-size:22px; }
    }
  </style>
</head>
<body>

<div class="film-stage" id="film-stage" data-layout="minimal">

  <!-- ── Top bar ── -->
  <div class="film-topbar">
    <div class="film-top-left">
      <span class="film-brandline">R.O.B. / ONE-PAGER</span>
      <span class="film-scene-label" id="film-scene-label">SCENE 01 · COLD-START</span>
    </div>
    <div class="film-top-right">
      <span id="film-clock">T+ 00:00.00</span>
      <span id="film-prog">PROG 0.0%</span>
      <span>V 5.0</span>
    </div>
  </div>

  <!-- ── Orbital clock (right) ── -->
  <div class="film-orbital film-orbital-right" aria-hidden="true">
    <div class="film-ring film-ring-xl"></div>
    <div class="film-ring film-ring-lg"></div>
    <div class="film-ring film-ring-md"></div>
    <div class="film-rotor rotor-major"><span class="film-node film-node-cyan"></span></div>
    <div class="film-rotor rotor-minor"><span class="film-node film-node-soft"></span></div>
    <div class="film-core-dot"></div>
    <div class="film-diamond"></div>
  </div>

  <!-- ── Orbital clock (left / bottom) ── -->
  <div class="film-orbital film-orbital-left" aria-hidden="true">
    <div class="film-ring film-ring-lg"></div>
    <div class="film-ring film-ring-md"></div>
    <div class="film-rotor rotor-gentle"><span class="film-node film-node-red"></span></div>
  </div>

  <!-- ── Orbital clock (center-right small) ── -->
  <div class="film-orbital film-orbital-center" aria-hidden="true">
    <div class="film-ring film-ring-md"></div>
    <div class="film-ring film-ring-sm"></div>
    <div class="film-core-dot"></div>
  </div>

  <!-- ── Signal strip (scene 01) ── -->
  <div class="film-signal-strip" aria-hidden="true">
    <div class="film-signal-node"></div>
    <div class="film-signal-link"></div>
    <div class="film-signal-node is-cyan"></div>
    <div class="film-signal-link"></div>
    <div class="film-signal-node is-dashed"></div>
  </div>

  <!-- ── Chrome overlays ── -->
  <div class="film-center-frame" id="film-center-frame">INIT · ONE-PAGER · V5.0</div>
  <div class="film-side-frame"   id="film-side-frame"   hidden></div>
  <div class="film-layer-frame"  id="film-layer-frame"  hidden></div>
  <div class="film-log-frame"    id="film-log-frame"    hidden></div>

  <!-- ── Scene number ── -->
  <div class="film-scene-number" id="film-scene-number">01</div>

  <!-- ── Main content ── -->
  <div class="film-layout">
    <div class="film-main">
      <div class="film-step" id="film-step">R.O.B. Concepting</div>
      <h1  class="film-title"    id="film-title">Visie, systeem en merk <em>als geheel.</em></h1>
      <p   class="film-subtitle" id="film-subtitle" hidden></p>
      <p   class="film-promise"  id="film-promise">R.O.B. Concepting — systeemontwerp voor MKB</p>
      <p   class="film-process"  id="film-process"  hidden></p>
    </div>
    <div class="film-points" id="film-points" data-layout="minimal"></div>
  </div>

  <!-- ── Footer: progress + controls ── -->
  <div class="film-footer">
    <div class="film-progress" id="film-progress"></div>
    <div class="film-controls">
      <button class="film-btn" id="film-toggle"  type="button">Pauze</button>
      <button class="film-btn" id="film-next"    type="button">Volgende</button>
      <button class="film-btn" id="film-restart" type="button">Herstart</button>
    </div>
  </div>

  <!-- ── Bottom bar ── -->
  <div class="film-bottom-bar">
    <span>R.O.B. CONCEPTING — SYSTEEMONTWERP VOOR MKB</span>
    <span><span class="film-rec-dot"></span>REC · APRIL 2026</span>
    <span>ROB-CONCEPTING.NL</span>
  </div>

</div><!-- /film-stage -->

<script>
  /* ══════════════════════════════════════
     Scene data
  ══════════════════════════════════════ */
  const SCENES = [
    {
      number: '01', navLabel: 'COLD-START',
      step: 'R.O.B. Concepting',
      title: 'Visie, systeem en merk <em>als geheel.</em>',
      subtitle: '', promise: 'R.O.B. Concepting — systeemontwerp voor MKB', process: '',
      duration: 10000, layout: 'minimal',
      centerFrame: 'INIT · ONE-PAGER · V5.0',
      sideFrame: '', layerFrame: '',
      logLines: [
        '[00.20] init · systeem boot',
        '[01.50] load · visie · propositie · merk',
        '[03.00] ready · wacht op richting'
      ],
      items: []
    },
    {
      number: '02', navLabel: 'VISIEDOCUMENT',
      step: '01  VISIEDOCUMENT',
      title: 'Van visie naar <em>propositie.</em>',
      subtitle: 'Van visie → propositie',
      promise: '', process: '',
      duration: 12500, layout: 'list',
      centerFrame: '', sideFrame: '01 VISIEDOCUMENT', layerFrame: 'LAAG 01',
      logLines: [
        '[08.50] open · laag 01 · visiedocument',
        '[10.10] scan · richting · ambitie · positie',
        '[11.70] frame · propositie gezet'
      ],
      items: [
        { label: 'Richtingsontwerp', text: 'Brengt richting, ambitie en positie terug tot een heldere koers.' },
        { label: 'Conceptopzet',     text: 'Zet de basis van je propositie en conceptuele lijn scherp.' },
        { label: 'Projectplan',      text: 'Vertaalt keuzes naar prioriteiten, stappen en volgorde.' }
      ]
    },
    {
      number: '03', navLabel: 'SYSTEEMONTWERP',
      step: '02  SYSTEEMONTWERP',
      title: 'Van propositie naar <em>merk.</em>',
      subtitle: 'Van propositie → merk',
      promise: '', process: '',
      duration: 12500, layout: 'list',
      centerFrame: '', sideFrame: '02 SYSTEEMONTWERP', layerFrame: 'LAAG 02',
      logLines: [
        '[22.50] open · laag 02 · systeemontwerp',
        '[24.10] koppel · propositie aan merkbasis',
        '[26.70] sync · stijl en structuur'
      ],
      items: [
        { label: 'Merkontwerp',      text: 'Geeft de propositie vorm in een herkenbare merkbasis.' },
        { label: 'Stijlkaders',      text: 'Leggen vast hoe het merk spreekt, oogt en zich gedraagt.' },
        { label: 'Systeemstructuur', text: 'Brengt samenhang aan tussen merk, middelen en uitvoering.' }
      ]
    },
    {
      number: '04', navLabel: 'MERKBOUW',
      step: '03  MERKBOUW',
      title: 'Van merk naar <em>continuïteit.</em>',
      subtitle: 'Van merk → continuïteit',
      promise: '', process: '',
      duration: 12500, layout: 'list',
      centerFrame: '', sideFrame: '03 MERKBOUW', layerFrame: 'LAAG 03',
      logLines: [
        '[36.50] open · laag 03 · merkbouw',
        '[38.10] vertaal · merk naar toepassing',
        '[40.30] borg · continuïteit in praktijk'
      ],
      items: [
        { label: 'Merkuitvoering',    text: 'Werkt het merk uit in concrete toepassingen.' },
        { label: 'Formatconstructie', text: 'Ontwikkelt vaste vormen en middelen voor herhaalbaar gebruik.' },
        { label: 'Systeemtoepassing', text: 'Zorgt dat het merk blijft werken in voortgang, keuzes en praktijk.' }
      ]
    },
    {
      number: '05', navLabel: 'AANBOD',
      step: 'AANBOD  CONCRETE SYSTEEMTOOLS',
      title: 'Functionaliteit binnen jouw <em>handbereik.</em>',
      subtitle: '', promise: '', process: '',
      duration: 13000, layout: 'grid',
      centerFrame: '', sideFrame: 'AANBOD  CONCRETE SYSTEEMTOOLS', layerFrame: 'TOOLS',
      logLines: [
        '[50.60] compile · output modules',
        '[52.10] map · websites · apps · dashboards',
        '[54.70] expose · systemen in handbereik'
      ],
      items: [
        { label: 'Websites',               text: 'Tool-first, systeem-gebouwde digitale omgevingen.',    icon: 'website' },
        { label: 'Apps',                   text: 'Functionele toepassingen voor dagelijks gebruik.',      icon: 'app'     },
        { label: 'Dashboards',             text: 'Overzicht en beslisondersteuning op maat.',             icon: 'dashboard' },
        { label: 'Portals & werkomgevingen', text: 'Digitale infrastructuur voor teams en klanten.',     icon: 'portal'  }
      ]
    },
    {
      number: '06', navLabel: 'CLOSE',
      step: 'BELOFTE',
      title: 'Functionele tools<br>voor je <em>onderneming</em>',
      subtitle: 'van start-up, scale-up tot turnaround.',
      promise: 'Geen adviesstapeling, maar doelgerichte bouw.',
      process: 'idee <em>→</em> concept <em>→</em> ontwikkeling <em>→</em> implementatie <strong>= concepting</strong>',
      duration: 14500, layout: 'close',
      centerFrame: '', sideFrame: '', layerFrame: '',
      logLines: [
        '[64.60] close · R.O.B. gereed',
        '[67.20] output · functionele tools',
        '[71.00] end · concepting online'
      ],
      items: []
    }
  ];

  /* ══════════════════════════════════════
     SVG icons for grid cards
  ══════════════════════════════════════ */
  const ICONS = {
    website: `<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="11" stroke="rgba(0,26,77,0.32)" stroke-width="1"/>
      <circle cx="14" cy="14" r="6"  stroke="rgba(0,26,77,0.22)" stroke-width="0.8"/>
      <circle cx="14" cy="14" r="2.5" fill="rgba(15,168,203,0.7)"/>
    </svg>`,
    app: `<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="3" width="12" height="22" rx="2.5" stroke="rgba(0,26,77,0.32)" stroke-width="1"/>
      <circle cx="14" cy="20.5" r="1.5" fill="rgba(15,168,203,0.6)"/>
    </svg>`,
    dashboard: `<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="4" width="22" height="20" rx="2" stroke="rgba(0,26,77,0.32)" stroke-width="1"/>
      <line x1="3" y1="10" x2="25" y2="10" stroke="rgba(0,26,77,0.18)" stroke-width="0.8"/>
      <circle cx="9" cy="17" r="2" fill="rgba(15,168,203,0.55)"/>
      <line x1="14" y1="15" x2="22" y2="15" stroke="rgba(0,26,77,0.2)" stroke-width="1"/>
      <line x1="14" y1="18" x2="20" y2="18" stroke="rgba(0,26,77,0.14)" stroke-width="1"/>
    </svg>`,
    portal: `<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="9" stroke="rgba(0,26,77,0.28)" stroke-width="1"/>
      <circle cx="14" cy="14" r="5" stroke="rgba(0,26,77,0.18)" stroke-width="0.8"/>
      <circle cx="14" cy="14" r="2" fill="rgba(15,168,203,0.65)"/>
      <line x1="14" y1="5"  x2="14" y2="23" stroke="rgba(0,26,77,0.12)" stroke-width="0.8"/>
      <line x1="5"  y1="14" x2="23" y2="14" stroke="rgba(0,26,77,0.12)" stroke-width="0.8"/>
    </svg>`
  };

  /* ══════════════════════════════════════
     DOM refs
  ══════════════════════════════════════ */
  const stage         = document.getElementById('film-stage');
  const elSceneLabel  = document.getElementById('film-scene-label');
  const elSceneNumber = document.getElementById('film-scene-number');
  const elClock       = document.getElementById('film-clock');
  const elProg        = document.getElementById('film-prog');
  const elStep        = document.getElementById('film-step');
  const elTitle       = document.getElementById('film-title');
  const elSubtitle    = document.getElementById('film-subtitle');
  const elPromise     = document.getElementById('film-promise');
  const elProcess     = document.getElementById('film-process');
  const elCenterFrame = document.getElementById('film-center-frame');
  const elSideFrame   = document.getElementById('film-side-frame');
  const elLayerFrame  = document.getElementById('film-layer-frame');
  const elLogFrame    = document.getElementById('film-log-frame');
  const elPoints      = document.getElementById('film-points');
  const elProgress    = document.getElementById('film-progress');
  const btnToggle     = document.getElementById('film-toggle');
  const btnNext       = document.getElementById('film-next');
  const btnRestart    = document.getElementById('film-restart');

  /* ══════════════════════════════════════
     State
  ══════════════════════════════════════ */
  let sceneIndex    = 0;
  let playing       = false;
  let playbackMs    = 0;
  let startedAt     = 0;
  let sceneTimer    = null;
  let transTimer    = null;
  let hudTimer      = null;

  const TOTAL_MS = SCENES.reduce((s, sc) => s + sc.duration, 0);

  function sceneOffset(i) {
    return SCENES.slice(0, i).reduce((s, sc) => s + sc.duration, 0);
  }

  /* ══════════════════════════════════════
     Helpers
  ══════════════════════════════════════ */
  function setHTML(el, val) { el.innerHTML = val || ''; el.hidden = !val; }
  function setText(el, val) { el.textContent = val || ''; el.hidden = !val; }

  function fmtTime(ms) {
    const t  = Math.max(0, ms) / 1000;
    const m  = String(Math.floor(t / 60)).padStart(2, '0');
    const s  = (t % 60).toFixed(2).padStart(5, '0');
    return `${m}:${s}`;
  }

  function buildLog(lines) {
    while (elLogFrame.firstChild) elLogFrame.removeChild(elLogFrame.firstChild);
    if (!lines || !lines.length) { elLogFrame.hidden = true; return; }
    lines.forEach(line => {
      const d = document.createElement('div');
      d.className = 'film-log-line';
      d.textContent = line;
      elLogFrame.appendChild(d);
    });
    elLogFrame.hidden = false;
  }

  function buildPoint(item, idx, layout) {
    const card = document.createElement('div');
    card.className = 'film-point';

    if (layout === 'grid') {
      card.style.opacity = '0'; // revealed by animateAanbod scan
      // Icon
      if (item.icon && ICONS[item.icon]) {
        const ico = document.createElement('div');
        ico.className = 'film-point-icon';
        ico.innerHTML = ICONS[item.icon];
        card.appendChild(ico);
      }
      const lbl = document.createElement('div');
      lbl.className = 'film-point-index';
      lbl.textContent = String(idx + 1).padStart(2, '0');
      const name = document.createElement('div');
      name.className = 'film-point-label';
      name.textContent = item.label;
      const txt = document.createElement('div');
      txt.className = 'film-point-text';
      txt.textContent = item.text;
      card.append(lbl, name, txt);
    } else {
      // List row: index | label | text
      const idxEl = document.createElement('div');
      idxEl.className = 'film-point-index';
      idxEl.textContent = String(idx + 1).padStart(2, '0');
      const lbl = document.createElement('div');
      lbl.className = 'film-point-label';
      lbl.textContent = item.label;
      const txt = document.createElement('div');
      txt.className = 'film-point-text';
      txt.textContent = item.text;
      card.append(idxEl, lbl, txt);
    }
    return card;
  }

  function animateAanbod() {
    if (sceneIndex !== 4) return;
    const cards = Array.from(elPoints.querySelectorAll('.film-point'));
    if (!cards.length) return;
    cards.forEach(c => { c.style.opacity = '0'; c.classList.remove('aanbod-visible'); });
    const prev = elPoints.querySelector('.aanbod-scanline');
    if (prev) prev.remove();
    const scan = document.createElement('div');
    scan.className = 'aanbod-scanline';
    elPoints.appendChild(scan);
    // Row 1 (cards 0+1) revealed as scan hits ~25%, row 2 (cards 2+3) at ~70%
    const delays = [230, 370, 620, 760];
    cards.forEach((card, i) => {
      setTimeout(() => { card.style.opacity = ''; card.classList.add('aanbod-visible'); }, delays[i]);
    });
    setTimeout(() => { if (scan.parentNode) scan.remove(); }, 1200);
  }

  function syncProgress() {
    Array.from(elProgress.children).forEach((btn, i) => {
      btn.classList.toggle('is-active', i === sceneIndex);
      btn.classList.toggle('is-past',   i < sceneIndex);
    });
  }

  function updateHud() {
    const elapsed = playing
      ? performance.now() - startedAt
      : playbackMs;
    const clamped = Math.min(Math.max(0, elapsed), TOTAL_MS);
    elClock.textContent = 'T+ ' + fmtTime(clamped);
    elProg.textContent  = 'PROG ' + ((clamped / TOTAL_MS) * 100).toFixed(1) + '%';
  }

  /* ══════════════════════════════════════
     Scene rendering
  ══════════════════════════════════════ */
  function applyScene(i) {
    sceneIndex = i;
    const sc     = SCENES[i];
    const layout = sc.layout;

    stage.dataset.layout = layout;
    elSceneLabel.textContent = `SCENE ${sc.number} · ${sc.navLabel}`;
    elSceneNumber.textContent = sc.number;
    elStep.textContent        = sc.step;

    setHTML(elTitle,    sc.title);
    setHTML(elSubtitle, sc.subtitle);
    setHTML(elPromise,  sc.promise);
    setHTML(elProcess,  sc.process);
    setText(elCenterFrame, sc.centerFrame);
    setText(elSideFrame,   sc.sideFrame);
    setText(elLayerFrame,  sc.layerFrame);
    buildLog(sc.logLines);

    elPoints.dataset.layout = layout;
    while (elPoints.firstChild) elPoints.removeChild(elPoints.firstChild);
    sc.items.forEach((item, idx) => elPoints.appendChild(buildPoint(item, idx, layout)));

    syncProgress();
    updateHud();
  }

  function renderScene(i, animate = true, syncPB = true) {
    const next = ((i % SCENES.length) + SCENES.length) % SCENES.length;

    if (syncPB) {
      playbackMs = sceneOffset(next);
      if (playing) startedAt = performance.now() - playbackMs;
    }

    if (!animate) {
      stage.classList.remove('is-transitioning');
      applyScene(next);
      if (next === 4) setTimeout(animateAanbod, 80);
      return;
    }

    stage.classList.add('is-transitioning');
    clearTimeout(transTimer);
    transTimer = setTimeout(() => {
      applyScene(next);
      requestAnimationFrame(() => {
        stage.classList.remove('is-transitioning');
        if (next === 4) setTimeout(animateAanbod, 180);
      });
    }, 200);
  }

  /* ══════════════════════════════════════
     Playback
  ══════════════════════════════════════ */
  function stopTimers() {
    clearTimeout(sceneTimer);
    clearInterval(hudTimer);
    sceneTimer = null;
    hudTimer   = null;
  }

  function scheduleNext() {
    stopTimers();
    if (!playing) return;

    const sc = SCENES[sceneIndex];
    stage.classList.add('is-playing');
    hudTimer = setInterval(updateHud, 80);

    sceneTimer = setTimeout(() => {
      const next = (sceneIndex + 1) % SCENES.length;
      renderScene(next, true, true);
      setTimeout(scheduleNext, 220); // after transition
    }, sc.duration);
  }

  function setPlaying(val) {
    if (playing === val) { updateHud(); return; }

    if (playing && !val) {
      playbackMs = performance.now() - startedAt;
    }

    playing = val;
    btnToggle.textContent = playing ? 'Pauze' : 'Play';

    if (!playing) {
      stage.classList.remove('is-playing');
      stopTimers();
      updateHud();
      return;
    }

    startedAt = performance.now() - playbackMs;
    scheduleNext();
  }

  /* ══════════════════════════════════════
     Controls
  ══════════════════════════════════════ */
  btnToggle.addEventListener('click', () => setPlaying(!playing));

  btnNext.addEventListener('click', () => {
    stopTimers();
    renderScene(sceneIndex + 1, true, true);
    if (playing) setTimeout(scheduleNext, 220);
  });

  btnRestart.addEventListener('click', () => {
    stopTimers();
    renderScene(0, true, true);
    updateHud();
    if (playing) setTimeout(scheduleNext, 220);
  });

  /* ══════════════════════════════════════
     Progress pill buttons
  ══════════════════════════════════════ */
  SCENES.forEach((sc, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'film-progress-item';
    btn.setAttribute('aria-label', `Scene ${sc.number}`);
    btn.addEventListener('click', () => {
      stopTimers();
      renderScene(i, true, true);
      if (playing) setTimeout(scheduleNext, 220);
    });
    elProgress.appendChild(btn);
  });

  /* ══════════════════════════════════════
     Init
  ══════════════════════════════════════ */
  renderScene(0, false, true);
  setPlaying(true);
